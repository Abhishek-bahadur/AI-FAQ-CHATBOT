<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot — Abhishek Bahadur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1f2e;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top navbar ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #1a1f2e;
      flex-shrink: 0;
    }
    .navbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .nav-title {
      font-size: 15px;
      font-weight: 500;
      color: #e2e8f0;
    }
    .nav-menu {
      width: 34px; height: 34px;
      background: #2d3548;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: #94a3b8;
    }

    /* ── Main scrollable area ── */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: #2d3548 transparent;
    }

    /* ── Welcome screen ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 20px 20px;
      text-align: center;
    }
    .welcome-icon {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 20px;
    }
    .welcome-greeting {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .welcome-title {
      font-size: 28px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .welcome-sub {
      font-size: 14px;
      color: #64748b;
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .chip {
      background: transparent;
      border: 1px solid #2d3548;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: #cbd5e1;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .chip:hover {
      background: #2d3548;
      border-color: #475569;
    }

    /* ── Chat messages ── */
    .chat-area {
      display: none;
      flex-direction: column;
      gap: 20px;
      padding: 24px 20px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }
    .chat-area.visible { display: flex; }

    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-row.bot  .msg-avatar { background: linear-gradient(135deg, #a855f7, #ec4899); }
    .msg-row.user .msg-avatar { background: #2d3548; }

    .msg-bubble {
      max-width: 75%;
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
    }
    .msg-row.bot  .msg-bubble {
      background: #242938;
      color: #e2e8f0;
      border-top-left-radius: 4px;
    }
    .msg-row.user .msg-bubble {
      background: #2d3548;
      color: #f1f5f9;
      border-top-right-radius: 4px;
    }

    /* ── Typing dots ── */
    .typing-bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
    }
    .dot {
      width: 7px; height: 7px;
      background: #64748b;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Input bar ── */
    .input-wrapper {
      flex-shrink: 0;
      padding: 12px 16px 20px;
      background: #1a1f2e;
    }
    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #242938;
      border: 1px solid #2d3548;
      border-radius: 28px;
      padding: 10px 14px;
      max-width: 760px;
      margin: 0 auto;
      transition: border-color 0.2s;
    }
    .input-bar:focus-within { border-color: #a855f7; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
    }
    #user-input::placeholder { color: #475569; }

    .input-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      background: transparent;
      border: none;
      color: #64748b;
      font-size: 16px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .input-icon:hover { color: #94a3b8; }

    #send-btn {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 15px;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    #send-btn:hover  { opacity: 0.85; }
    #send-btn:active { transform: scale(0.93); }

    .input-footer {
      text-align: center;
      font-size: 11px;
      color: #334155;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="navbar-left">
    <div class="nav-logo">✦</div>
    <span class="nav-title">Abhishek's AI</span>
  </div>
  <div class="nav-menu">⋮</div>
</div>

<!-- Main scrollable content -->
<div class="main" id="main">

  <!-- Welcome screen (shown before first message) -->
  <div class="welcome" id="welcome-screen">
    <div class="welcome-icon">✦</div>
    <div class="welcome-greeting">Hi, Buddy</div>
    <div class="welcome-title">Can I help you<br>with anything?</div>
    <div class="welcome-sub">
      Ready to assist you with anything you need!
      Just type your question or click a suggestion below.
    </div>
    <div class="suggestion-chips">
      <button class="chip" onclick="askChip('What is Python?')">What is Python?</button>
      <button class="chip" onclick="askChip('Explain AI')">Explain AI</button>
      <button class="chip" onclick="askChip('What is Machine Learning?')">What is Machine Learning?</button>
      <button class="chip" onclick="askChip('What is Flask?')">What is Flask?</button>
    </div>
  </div>

  <!-- Chat messages (hidden until first message) -->
  <div class="chat-area" id="chat-area"></div>

</div>

<!-- Input bar -->
<div class="input-wrapper">
  <div class="input-bar">
    
    <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" />
    
    <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
  </div>
  <div class="input-footer">Built by Abhishek Bahadur · Python + Flask + Gemini AI</div>
</div>

<script>
  const input       = document.getElementById('user-input');
  const chatArea    = document.getElementById('chat-area');
  const welcome     = document.getElementById('welcome-screen');
  let chatStarted   = false;

  // Enter key sends message
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  // Suggestion chip clicked
  function askChip(text) {
    input.value = text;
    sendMessage();
  }

  // Add a message bubble to chat
  function addMessage(text, sender) {
    const row = document.createElement('div');
    row.className = `msg-row ${sender}`;
    row.innerHTML = `
      <div class="msg-avatar">${sender === 'bot' ? '✦' : '👤'}</div>
      <div class="msg-bubble">${text}</div>
    `;
    chatArea.appendChild(row);
    chatArea.scrollIntoView({ block: 'end' });
  }

  // Show animated typing indicator
  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing';
    row.innerHTML = `
      <div class="msg-avatar">✦</div>
      <div class="msg-bubble typing-bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    `;
    chatArea.appendChild(row);
    chatArea.scrollIntoView({ block: 'end' });
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    // First message — hide welcome, show chat
    if (!chatStarted) {
      welcome.style.display = 'none';
      chatArea.classList.add('visible');
      chatStarted = true;
    }

    addMessage(text, 'user');
    input.value = '';
    showTyping();

    // ── This is the fetch() call that sends your message to Flask ──
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.response, 'bot');
    } catch (err) {
      removeTyping();
      addMessage('⚠️ Could not connect to server. Make sure Flask is running.', 'bot');
    }
  }
</script>

</body>
</html>
